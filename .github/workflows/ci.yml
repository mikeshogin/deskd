name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Tests
        run: cargo test

  archlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      # Build archlint-rs from source
      - name: Cache archlint-rs
        uses: actions/cache@v4
        with:
          path: /tmp/archlint-rs/target/release/archlint
          key: archlint-rs-${{ runner.os }}-v1

      - name: Build archlint-rs
        run: |
          if [ ! -f /tmp/archlint-rs/target/release/archlint ]; then
            git clone --depth 1 https://github.com/mshogin/archlint.git /tmp/archlint-repo
            cd /tmp/archlint-repo/archlint-rs
            cargo build --release
            mkdir -p /tmp/archlint-rs/target/release
            cp target/release/archlint /tmp/archlint-rs/target/release/archlint
          fi

      # Run archlint scan on the codebase
      - name: Scan architecture
        id: scan
        run: |
          ARCHLINT=/tmp/archlint-rs/target/release/archlint

          echo "## Architecture scan" > /tmp/archlint-report.md
          echo "" >> /tmp/archlint-report.md

          # Full scan with YAML output for machine processing
          $ARCHLINT scan ./src --format yaml > /tmp/arch.yaml 2>/dev/null || true

          # Human-readable scan
          SCAN_OUTPUT=$($ARCHLINT scan ./src 2>/dev/null || true)

          # Count components and links
          COMPONENTS=$(grep -c "^  - name:" /tmp/arch.yaml 2>/dev/null || echo "0")
          LINKS=$(grep -c "^    - from:" /tmp/arch.yaml 2>/dev/null || echo "0")

          echo "| Metric | Count |" >> /tmp/archlint-report.md
          echo "|--------|-------|" >> /tmp/archlint-report.md
          echo "| Components | $COMPONENTS |" >> /tmp/archlint-report.md
          echo "| Links | $LINKS |" >> /tmp/archlint-report.md
          echo "" >> /tmp/archlint-report.md

          # Run diff if this is a PR (compare with base branch)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}

            DIFF_OUTPUT=$($ARCHLINT diff $BASE_SHA $HEAD_SHA 2>/dev/null || true)
            if [ -n "$DIFF_OUTPUT" ]; then
              echo "### Architecture diff (base → PR)" >> /tmp/archlint-report.md
              echo '```' >> /tmp/archlint-report.md
              echo "$DIFF_OUTPUT" >> /tmp/archlint-report.md
              echo '```' >> /tmp/archlint-report.md
              echo "" >> /tmp/archlint-report.md
            fi
          fi

          # Performance analysis
          PERF_OUTPUT=$($ARCHLINT perf ./src 2>/dev/null || true)
          if [ -n "$PERF_OUTPUT" ]; then
            echo "### Performance analysis" >> /tmp/archlint-report.md
            echo '```' >> /tmp/archlint-report.md
            echo "$PERF_OUTPUT" | head -30 >> /tmp/archlint-report.md
            echo '```' >> /tmp/archlint-report.md
          fi

          cat /tmp/archlint-report.md

      # Post results as PR comment
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/archlint-report.md', 'utf8');

            // Find existing archlint comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('## Architecture scan') && c.user.type === 'Bot'
            );

            const body = `${report}\n\n---\n*Generated by [archlint-rs](https://github.com/mshogin/archlint)*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
